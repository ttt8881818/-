<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水回りヒアリングシート | ハコリノベ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#F7F6F3;color:#1a1a1a;min-height:100vh}

.header{background:#1a1a1a;padding:16px 24px}
.header-logo{color:#fff;font-size:11px;letter-spacing:4px;font-weight:600}

.wrap{max-width:560px;margin:0 auto;padding:24px 16px 80px}

/* カード */
.card{background:#fff;border-radius:16px;border:1px solid #EBEBEB;padding:24px;margin-bottom:12px}

/* セクションヘッダー（設備名 + 横線） */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.sec-head-label{font-size:10px;letter-spacing:3px;font-weight:700;white-space:nowrap;color:#1a1a1a}
.sec-head::after{content:'';flex:1;height:1px;background:#E8E5E0}

/* 名前入力 */
.name-label{font-size:13px;color:#777;margin-bottom:8px}
.name-input{width:100%;border:1.5px solid #E8E5E0;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.name-input:focus{border-color:#1a1a1a}
.name-input.err{border-color:#e74c3c}

/* 設備トグル */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.equip-btn{background:#fff;border:1.5px solid #E8E5E0;border-radius:12px;padding:14px;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;transition:all .15s;text-align:center;font-family:inherit}
.equip-btn.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.equip-grid.err .equip-btn:not(.active){border-color:#e74c3c}

/* 質問ブロック */
.q-block{margin-bottom:20px}
.q-block:last-child{margin-bottom:0}
.q-label{font-size:12px;color:#888;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.q-note{font-size:10px;color:#bbb;background:#F7F6F3;padding:1px 6px;border-radius:99px}
.q-block.err .q-label{color:#e74c3c}

/* ピル（横並びチップ） */
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{background:#fff;border:1.5px solid #E8E5E0;border-radius:99px;padding:7px 16px;font-size:13px;font-weight:500;color:#1a1a1a;cursor:pointer;transition:all .12s;font-family:inherit}
.pill:hover{border-color:#aaa}
.pill.active{background:#1a1a1a;border-color:#1a1a1a;color:#fff}

/* 行形式（ラベル左・ピル右） */
.q-rows{border-top:1px solid #F0EEE9}
.q-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F0EEE9;gap:12px}
.q-row-label{font-size:13px;color:#555;flex-shrink:0}
.q-row.err .q-row-label{color:#e74c3c}
.q-row .pills{flex-wrap:nowrap;justify-content:flex-end}

/* 自由入力 */
.free-input{width:100%;border:1.5px solid #E8E5E0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;margin-top:8px;transition:border-color .15s}
.free-input:focus{border-color:#1a1a1a}

/* テキストエリア */
.textarea{width:100%;border:1.5px solid #E8E5E0;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:72px;transition:border-color .15s;margin-top:4px}
.textarea:focus{border-color:#1a1a1a}

/* 画像アップロード */
.upload-zone{border:1.5px dashed #D8D5D0;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:background .12s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.upload-zone:hover{background:#F7F6F3}
.upload-zone span{font-size:12px;color:#aaa}
.file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.file-chip{display:flex;align-items:center;gap:8px;background:#F0EEE9;border-radius:8px;padding:5px 10px;font-size:12px;color:#555}
.file-chip span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip button{background:none;border:none;cursor:pointer;color:#bbb;font-size:13px;padding:0}

/* 送信エリア */
.submit-area{margin-top:8px}
.btn-submit{width:100%;background:#1a1a1a;color:#fff;border:none;padding:16px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-submit:hover{opacity:.85}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:12px 14px;font-size:13px;color:#c0392b;margin-bottom:12px;display:none}

/* 完了画面 */
#done-wrap{display:none;max-width:560px;margin:0 auto;padding:24px 16px}
.done-card{background:#fff;border-radius:16px;border:1px solid #EBEBEB;padding:40px 24px;text-align:center}
.done-icon{width:52px;height:52px;background:#1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.done-title{font-size:20px;font-weight:700;margin-bottom:8px}
.done-sub{font-size:13px;color:#777;line-height:1.8}

/* セクション表示アニメ */
.equip-section{display:none}
.equip-section.open{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">HACO RENOVE</div>
</div>

<div class="wrap" id="main-wrap">

  <!-- お名前 -->
  <div class="card">
    <div class="name-label">お名前（フルネーム）</div>
    <input class="name-input" type="text" id="in-name" placeholder="例：山田 太郎">

  <!-- 設備選択 -->

    <div class="equip-grid" id="equip-grid">

      <button class="equip-btn" data-val="toilet"  onclick="toggleEquip(this)">トイレ</button>
    </div>
  </div>

  <!-- キッチン -->
  <div class="card equip-section" id="sec-kitchen">
    <div class="sec-head"><span class="sec-head-label">キッチン</span></div>

    <div class="q-block" id="qb-k1">
      <div class="q-label">スタイル <span class="q-note">複数可</span></div>
      <div class="pills" id="g-k1">

        <button class="pill" data-val="アイランド"  onclick="multiPick('k1',this)">アイランド</button>
        <button class="pill" data-val="Ⅱ型"        onclick="multiPick('k1',this)">Ⅱ型</button>
        <button class="pill" data-val="L型"         onclick="multiPick('k1',this)">L型</button>

    </div>

    <div class="q-block" id="qb-k2">

      <div class="q-label">コンロ種類</div>
      <div class="pills" id="g-k3">

    <div class="q-block" id="qb-k4">

      <div class="pills" id="g-k4">

    </div>

    <div class="q-block" id="qb-k5">
      <div class="q-label">グリル</div>
      <div class="pills" id="g-k5">

        <button class="pill" data-val="片面焼き" onclick="pick('k5',this)">片面焼き</button>
        <button class="pill" data-val="両面焼き" onclick="pick('k5',this)">両面焼き</button>
      </div>
    </div>

    <div class="q-block" id="qb-k6">
      <div class="q-label">食洗機</div>
      <div class="pills" id="g-k6">
        <button class="pill" data-val="不要"        onclick="pick('k6',this)">不要</button>
        <button class="pill" data-val="必要（国産）"  onclick="pick('k6',this)">必要（国産）</button>
        <button class="pill" data-val="必要（海外製）" onclick="pick('k6',this)">必要（海外製）</button>
      </div>
    </div>

    <!-- 行形式：ホース引き出し・自動水栓・浄水器・パントリー -->
    <div class="q-rows">
      <div class="q-row" id="qb-k7">
        <span class="q-row-label">ホース引き出し</span>
        <div class="pills" id="g-k7">
          <button class="pill" data-val="必要" onclick="pick('k7',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('k7',this)">不要</button>
        </div>
      </div>
      <div class="q-row" id="qb-k8">
        <span class="q-row-label">自動水栓</span>
        <div class="pills" id="g-k8">
          <button class="pill" data-val="必要" onclick="pick('k8',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('k8',this)">不要</button>
        </div>
      </div>
      <div class="q-row" id="qb-k9">
        <span class="q-row-label">浄水器</span>
        <div class="pills" id="g-k9">
          <button class="pill" data-val="必要" onclick="pick('k9',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('k9',this)">不要</button>
        </div>
      </div>
      <div class="q-row" id="qb-k10">
        <span class="q-row-label">パントリー</span>
        <div class="pills" id="g-k10">
          <button class="pill" data-val="必要" onclick="pick('k10',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('k10',this)">不要</button>
        </div>
      </div>
    </div>

    <div class="q-block" style="margin-top:20px">
      <div class="q-label">その他・イメージ画像 <span class="q-note">任意</span></div>
      <div class="upload-zone" onclick="document.getElementById('up-k').click()">
        <svg width="16" height="16" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>

      </div>

      <textarea class="textarea" id="ta-k" placeholder="自由にご記入ください"></textarea>
    </div>
  </div>

  <!-- ユニットバス -->
  <div class="card equip-section" id="sec-ub">
    <div class="sec-head"><span class="sec-head-label">ユニットバス</span></div>

    <div class="q-block" id="qb-u1">
      <div class="q-label">サイズ <span class="q-note">後ろ2桁が奥行き</span></div>
      <div class="pills" id="g-u1">
        <button class="pill" data-val="1216"    onclick="pick('u1',this)">1216</button>
        <button class="pill" data-val="1418"    onclick="pick('u1',this)">1418</button>
        <button class="pill" data-val="1620"    onclick="pick('u1',this)">1620</button>
        <button class="pill" data-val="1624"    onclick="pick('u1',this)">1624</button>
        <button class="pill" data-val="現状のまま" onclick="pick('u1',this)">現状のまま</button>
      </div>
    </div>

    <div class="q-rows">
      <div class="q-row" id="qb-u2">
        <span class="q-row-label">浴室暖房乾燥機</span>
        <div class="pills" id="g-u2">
          <button class="pill" data-val="必要" onclick="pick('u2',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('u2',this)">不要</button>
        </div>
      </div>
      <div class="q-row" id="qb-u3">
        <span class="q-row-label">ランドリーパイプ</span>
        <div class="pills" id="g-u3">
          <button class="pill" data-val="0本" onclick="pick('u3',this)">0本</button>
          <button class="pill" data-val="1本" onclick="pick('u3',this)">1本</button>
          <button class="pill" data-val="2本" onclick="pick('u3',this)">2本</button>
        </div>
      </div>
    </div>

    <div class="q-block" style="margin-top:20px">
      <div class="q-label">その他・ご要望 <span class="q-note">任意</span></div>
      <textarea class="textarea" id="ta-u" placeholder="自由にご記入ください"></textarea>
    </div>
  </div>

  <!-- 洗面台 -->
  <div class="card equip-section" id="sec-men">
    <div class="sec-head"><span class="sec-head-label">洗面台</span></div>

    <div class="q-block" id="qb-m1">
      <div class="q-label">ボウルタイプ</div>
      <div class="pills" id="g-m1">
        <button class="pill" data-val="ベッセル"    onclick="pick('m1',this)">ベッセル</button>
        <button class="pill" data-val="オンボウル"   onclick="pick('m1',this)">オンボウル</button>
        <button class="pill" data-val="埋め込み"    onclick="pick('m1',this)">埋め込み</button>
        <button class="pill" data-val="ボウル一体型" onclick="pick('m1',this)">ボウル一体型</button>
      </div>
    </div>

    <div class="q-block" id="qb-m2">
      <div class="q-label">希望幅</div>
      <div class="pills" id="g-m2">
        <button class="pill" data-val="600mm"    onclick="pick('m2',this)">600mm</button>
        <button class="pill" data-val="750mm"    onclick="pick('m2',this)">750mm</button>
        <button class="pill" data-val="900mm"    onclick="pick('m2',this)">900mm</button>
        <button class="pill" data-val="1200mm"   onclick="pick('m2',this)">1200mm</button>
        <button class="pill" data-val="__free__" onclick="pick('m2',this)">その他</button>
      </div>
      <input class="free-input" type="text" id="free-m2" placeholder="例：800mm" style="display:none" oninput="ans.m2=this.value">
    </div>

    <div class="q-block" id="qb-m3">
      <div class="q-label">収納タイプ</div>
      <div class="pills" id="g-m3">
        <button class="pill" data-val="引き出し" onclick="pick('m3',this)">引き出し</button>
        <button class="pill" data-val="開き扉"   onclick="pick('m3',this)">開き扉</button>
        <button class="pill" data-val="オープン" onclick="pick('m3',this)">オープン</button>
        <button class="pill" data-val="なし"     onclick="pick('m3',this)">なし</button>
      </div>
    </div>

    <div class="q-rows">
      <div class="q-row" id="qb-m4">
        <span class="q-row-label">水栓タイプ</span>
        <div class="pills" id="g-m4">
          <button class="pill" data-val="壁付き" onclick="pick('m4',this)">壁付き</button>
          <button class="pill" data-val="台付き" onclick="pick('m4',this)">台付き</button>
        </div>
      </div>
      <div class="q-row" id="qb-m5">
        <span class="q-row-label">ホース引き出し</span>
        <div class="pills" id="g-m5">
          <button class="pill" data-val="必要" onclick="pick('m5',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('m5',this)">不要</button>
        </div>
      </div>
      <div class="q-row" id="qb-m6">
        <span class="q-row-label">自動水栓</span>
        <div class="pills" id="g-m6">
          <button class="pill" data-val="必要" onclick="pick('m6',this)">必要</button>
          <button class="pill" data-val="不要" onclick="pick('m6',this)">不要</button>
        </div>
      </div>
    </div>

    <div class="q-block" style="margin-top:20px">
      <div class="q-label">その他・ご要望 <span class="q-note">任意</span></div>
      <textarea class="textarea" id="ta-m" placeholder="自由にご記入ください"></textarea>
    </div>
  </div>

  <!-- トイレ -->
  <div class="card equip-section" id="sec-toilet">
    <div class="sec-head"><span class="sec-head-label">トイレ</span></div>

    <div class="q-block" id="qb-t1">
      <div class="q-label">メーカー</div>
      <div class="pills" id="g-t1">
        <button class="pill" data-val="TOTO"      onclick="pick('t1',this)">TOTO</button>
        <button class="pill" data-val="LIXIL"     onclick="pick('t1',this)">LIXIL</button>

      <div class="pills" id="g-t3">

        <button class="pill" data-val="独立手洗い"     onclick="pick('t3',this)">独立手洗い</button>

    <div class="q-rows">
      <div class="q-row" id="qb-t4">
        <span class="q-row-label">自動開閉</span>
        <div class="pills" id="g-t4">
          <button class="pill" data-val="あり" onclick="pick('t4',this)">あり</button>
          <button class="pill" data-val="なし" onclick="pick('t4',this)">なし</button>
        </div>
      </div>
    </div>

    <div class="q-block" style="margin-top:20px">
      <div class="q-label">その他・ご要望 <span class="q-note">任意</span></div>
      <textarea class="textarea" id="ta-t" placeholder="自由にご記入ください"></textarea>
    </div>
  </div>

  <!-- 送信 -->
  <div class="submit-area">
    <div class="err-box" id="err-submit"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitForm()">この内容で送信する →</button>
  </div>

</div>

<!-- 完了 -->
<div id="done-wrap">
  <div class="done-card">
    <div class="done-icon">
      <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="done-title">ご回答ありがとうございました</div>
    <div class="done-sub">内容を受け付けました。<br>担当デザイナーより改めてご連絡いたします。</div>
  </div>
</div>

<script>
const ans = {};
const multiAns = { k1: [] };
const selectedEquip = new Set();

// ─── 設備トグル ──────────────────────────────
function toggleEquip(btn) {
  const val = btn.dataset.val;
  const sec = document.getElementById('sec-' + val);
  btn.classList.toggle('active');
  if (selectedEquip.has(val)) {
    selectedEquip.delete(val);
    sec.classList.remove('open');
    setTimeout(() => { sec.style.display = 'none'; }, 0);
  } else {
    selectedEquip.add(val);
    sec.style.display = 'block';
    requestAnimationFrame(() => sec.classList.add('open'));
    setTimeout(() => sec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }
  document.getElementById('equip-grid').classList.remove('err');
}

// ─── 単一選択 ────────────────────────────────
function pick(key, btn) {
  document.querySelectorAll('#g-' + key + ' .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const isFree = btn.dataset.val === '__free__';
  ans[key] = isFree ? '' : btn.dataset.val;
  const fi = document.getElementById('free-' + key);
  if (fi) {
    fi.style.display = isFree ? 'block' : 'none';
    if (isFree) fi.focus();
  }
  clearErr(key);
}

// ─── 複数選択 ────────────────────────────────
function multiPick(key, btn) {
  btn.classList.toggle('active');
  const val = btn.dataset.val;
  const arr = multiAns[key];
  const i = arr.indexOf(val);
  if (i > -1) arr.splice(i, 1); else arr.push(val);
  ans[key] = arr.join(' / ');
  clearErr(key);
}

// ─── タンク選択（手洗い連動） ────────────────
function pickTank(btn) {
  pick('t2', btn);
  const t3block = document.getElementById('qb-t3');
  const t3tankBtn = document.getElementById('t3-tank');
  const t2 = ans.t2;

  // 手洗いブロックを表示
  t3block.style.display = 'block';

  // タンクレス → タンク上手洗いを非表示
  if (t2 === 'タンクレス') {
    t3tankBtn.style.display = 'none';
    if (ans.t3 === 'タンク上手洗い') {
      ans.t3 = '';
      document.querySelectorAll('#g-t3 .pill').forEach(p => p.classList.remove('active'));
    }
  } else {
    t3tankBtn.style.display = '';
  }
}

// ─── 画像アップロード ────────────────────────
function addFiles(key, input) {
  const list = document.getElementById('fl-' + key);
  Array.from(input.files).forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `<span>${f.name}</span><button onclick="this.parentElement.remove()">×</button>`;
    list.appendChild(chip);
  });
}

// ─── バリデーション ──────────────────────────
// 必須項目の定義（設備ID → チェックするansキーとqb-ID）
const REQUIRED = {
  kitchen: ['k1','k2','k3','k4','k5','k6','k7','k8','k9','k10'],
  ub:      ['u1','u2','u3'],
  men:     ['m1','m2','m3','m4','m5','m6'],
  toilet:  ['t1','t2','t3','t4'],
};

function clearErr(key) {
  const el = document.getElementById('qb-' + key);
  if (el) el.classList.remove('err');
}

function validate() {
  let ok = true;
  const name = document.getElementById('in-name').value.trim();
  if (!name) {
    document.getElementById('in-name').classList.add('err');
    ok = false;
  }
  if (selectedEquip.size === 0) {
    document.getElementById('equip-grid').classList.add('err');
    ok = false;
  }
  selectedEquip.forEach(equip => {
    REQUIRED[equip].forEach(key => {
      // t3はタンク選択済み時のみ必須
      if (key === 't3' && !ans.t2) return;
      if (!ans[key]) {
        const el = document.getElementById('qb-' + key);
        if (el) el.classList.add('err');
        ok = false;
      }
    });
  });
  return ok;
}

// ─── 送信 ────────────────────────────────────
async function submitForm() {
  if (!validate()) {
    const firstErr = document.querySelector('.err');
    if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const btn = document.getElementById('btn-submit');
  const errBox = document.getElementById('err-submit');
  btn.textContent = '送信中...';
  btn.disabled = true;
  errBox.style.display = 'none';

  const today = new Date().toISOString().split('T')[0];
  const get = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const name = document.getElementById('in-name').value.trim();

  const formData = {
    projectName: name + ' — ' + today,
    name, date: today,
    k1: ans.k1||'', k2: ans.k2||'', k3: ans.k3||'', k4: ans.k4||'',
    k5: ans.k5||'', k6: ans.k6||'', k7: ans.k7||'', k8: ans.k8||'',
    k9: ans.k9||'', k10: ans.k10||'', kOther: get('ta-k'),
    u1: ans.u1||'', u2: ans.u2||'', u3: ans.u3||'', uOther: get('ta-u'),
    m1: ans.m1||'', m2: ans.m2||'', m3: ans.m3||'', m4: ans.m4||'',
    m5: ans.m5||'', m6: ans.m6||'', mOther: get('ta-m'),
    t1: ans.t1||'', t2: ans.t2||'', t3: ans.t3||'', t4: ans.t4||'', tOther: get('ta-t'),
  };

  try {
    const res = await fetch('/api/save-to-notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      errBox.textContent = '保存エラー: ' + (err.error || res.status);
      errBox.style.display = 'block';
      btn.textContent = 'この内容で送信する →';
      btn.disabled = false;
      return;
    }
  } catch (e) {
    errBox.textContent = '通信エラー: ' + e.message;
    errBox.style.display = 'block';
    btn.textContent = 'この内容で送信する →';
    btn.disabled = false;
    return;
  }

  document.getElementById('main-wrap').style.display = 'none';
  document.getElementById('done-wrap').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
